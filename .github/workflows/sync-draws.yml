name: Sync Loto Draws

on:
  # Manuel trigger
  workflow_dispatch:
  
  # Automatique: Lundi, Mercredi, Samedi à 22h (après les tirages)
  schedule:
    - cron: '0 22 * * 1,3,6'

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Sync production data
        env:
          SYNC_API_KEY: ${{ secrets.SYNC_API_KEY }}
          VERCEL_URL: https://loto-optimizer.vercel.app
        run: node scripts/sync-production.js
